name: 🐛 Bug Report
description: Report a software bug
labels: ['bug']
body:
    - type: markdown
      attributes:
          value: |
              Thank you for submitting a bug report! Please fill in the following information as thoroughly as possible to help us locate and fix the issue faster.

              > **Note**: Please do not submit plugin-related issues here. This project is a player only and does not provide music sources.

    - type: checkboxes
      id: checklist
      attributes:
          label: Pre-submission checklist
          options:
              - label: I have searched existing Issues and confirmed this is not a duplicate
                required: true
              - label: I confirm this is not a plugin-related issue
                required: true

    - type: input
      id: version
      attributes:
          label: App Version
          description: You can find the version number on the Settings page
          placeholder: 'e.g. 0.5.0'
      validations:
          required: true

    - type: dropdown
      id: os
      attributes:
          label: Operating System
          options:
              - Windows
              - macOS
              - Linux
      validations:
          required: true

    - type: input
      id: os-version
      attributes:
          label: OS Version
          placeholder: 'e.g. Windows 11 23H2 / macOS 15.0 / Ubuntu 24.04'
      validations:
          required: true

    - type: textarea
      id: description
      attributes:
          label: Bug Description
          description: A clear and concise description of the bug
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: Steps to Reproduce
          description: Detailed steps to reproduce the issue
          placeholder: |
              1. Open the app
              2. Click on ...
              3. Perform ...
              4. Error occurs
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior
          description: Describe what you expected to happen
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: Actual Behavior
          description: Describe what actually happened
      validations:
          required: true

    - type: textarea
      id: screenshots
      attributes:
          label: Screenshots or Logs
          description: If applicable, paste screenshots or error logs here
      validations:
          required: false

    - type: textarea
      id: additional
      attributes:
          label: Additional Context
          description: Any other information that might be helpful
      validations:
          required: false
