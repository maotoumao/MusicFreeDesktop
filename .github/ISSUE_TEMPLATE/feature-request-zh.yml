name: ✨ 功能请求
description: 提出一个新功能或改进建议
labels: ['enhancement']
body:
    - type: markdown
      attributes:
          value: |
              感谢你提出功能建议！请尽量描述清楚你的需求场景，这将帮助我们更好地理解和评估。

              > **注意**：插件相关的功能请求请勿在此提交。

    - type: checkboxes
      id: checklist
      attributes:
          label: 提交前确认
          options:
              - label: 我已搜索过现有 Issues，确认没有重复的请求
                required: true

    - type: textarea
      id: problem
      attributes:
          label: 问题场景
          description: 描述你遇到的问题或不便之处，这个功能要解决什么问题？
          placeholder: '当我在 ... 的时候，我希望能够 ...'
      validations:
          required: true

    - type: textarea
      id: solution
      attributes:
          label: 期望的方案
          description: 描述你期望的功能或解决方案
      validations:
          required: true

    - type: textarea
      id: alternatives
      attributes:
          label: 替代方案
          description: 描述你考虑过的其他替代方案（如有）
      validations:
          required: false

    - type: textarea
      id: additional
      attributes:
          label: 补充信息
          description: 其他可能有帮助的截图或信息
      validations:
          required: false
